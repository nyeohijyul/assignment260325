<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미니 리스트</title>
    <style>
      button { margin-left: 10px; }
      input { margin-left: 40px; }
      .done {
        color: grey;
        text-decoration: line-through grey 1px;
      }
    </style>
  </head>
  <body>
    <ul id="list">
      <li>공부하기<button>✖</button></li>
    </ul>
    <input id="tasktextInput" type="text" placeholder="할 일을 입력하세요." />
    <button id="addBtn">✔</button>
    <button id="resetBtn">⭮</button>
    <script>
      const list = document.querySelector("#list");
      const textInput = document.querySelector("#tasktextInput");
      const addBtn = document.querySelector("#addBtn");
      const resetBtn = document.querySelector("#resetBtn");

      function appendNewLI() {
        if ( getInputValue() ) {
          const newLI = document.createElement("li");
          newLI.textContent = getInputValue();
          const newBtn = document.createElement("button");
          newBtn.textContent = "✖";
          newLI.appendChild(newBtn);
          list.appendChild(newLI);
          resetInputValue();
        } else { alert("할 일을 입력하세요."); }
      }
      function getInputValue() { return textInput.value.trim(); }
      function resetInputValue() { textInput.value = ""; }

      list.addEventListener( "click", event => {
        if ( event.target.tagName == "LI" ) { event.target.classList.toggle("done"); }
        if ( event.target.tagName == "BUTTON" ) { event.target.parentNode.remove(); }
      } );
      addBtn.addEventListener( "click", appendNewLI );
      resetBtn.addEventListener( "click", resetInputValue );
    </script>
  </body>
</html>
